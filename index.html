<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 10px;
            max-width: 300px;
        }
    </style>
</head>

<body>
    <div>
        <form action="" id="form" class="container">
            <input type="text" id="fName" placeholder="Firstname">
            <input type="text" id="lName" placeholder="Lastname">
            <input type="text" id="email" placeholder="Email">
            <input type="text" id="city" placeholder="City">
            <select name="" id="state">
                <option value="">Select state</option>
                <option value="karnataka">karnataka</option>
                <option value="mumbai">mumbai</option>
                <option value="telangana">telangana</option>
            </select>
            <button type="submit" id="submitBttn">Submit</button>
            <button type="button" id="remove">Clear</button>

        </form>
        <div class="display">
            <div>Firstname: <span class="dfname"></span></div>
            <div>Lastname: <span class="dlname"></span></div>
            <div>Email: <span class="demail"></span></div>
            <div>City: <span class="dcity"></span></div>
            <div>State: <span class="dstate"></span></div>
        </div>
    </div>

    <script>
        let firstname = document.querySelector("#fName");
        let lastname = document.querySelector("#lName");
        let email = document.querySelector("#email");
        let city = document.querySelector("#city");
        let state = document.querySelector("#state");

        let dfName = document.querySelector(".dfname")
        let dlName = document.querySelector(".dlname")
        let dEmail = document.querySelector(".demail")
        let dCity = document.querySelector(".dcity")
        let dState = document.querySelector(".dstate")

        let submitBtn = document.querySelector("#submitBttn");
        let form = document.querySelector("#form");
        let display = document.querySelector(".display");
        let remove = document.querySelector("#remove")
        display.style.display = "none"

        function inputCheck() {
            let inputs = [firstname, lastname, email, city, state]
            let emptyInput = inputs.some((input) => input.value.trim() === "");
            submitBtn.disabled = emptyInput;
        }


        [firstname, lastname, email, city, state].forEach((input) => {
            input.addEventListener("input", inputCheck)
        })

        submitBtn.disabled = true

        form.addEventListener("submit", (e) => {
            e.preventDefault()

            let userdata = {
                firstname: firstname.value,
                lastname: lastname.value,
                email: email.value,
                city: city.value,
                state: state.value
            }

            localStorage.setItem("userdata", JSON.stringify(userdata))
            // console.log(userdata);
            displayData(userdata)
            alert("Your form has been submitted successfully")
        })

        window.addEventListener("DOMContentLoaded", () => {
            let saved = localStorage.getItem("userdata")

            if (saved) {
                let data = JSON.parse(saved)

                firstname.value = data.firstname
                lastname.value = data.lastname
                email.value = data.email
                city.value = data.city
                state.value = data.state

                displayData(data)
                inputCheck()
            }

        })
        function displayData(data) {
            dfName.textContent = data.firstname
            dlName.textContent = data.lastname
            dEmail.textContent = data.email
            dCity.textContent = data.city
            dState.textContent = data.state
            display.style.display = "block"

        }
        remove.addEventListener("click", () => {
            localStorage.clear("userdata");
            display.style.display = "none"
            form.reset();
            submitBtn.disabled = true
        })

    </script>
</body>

</html>
