<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .bttns {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div>
            <div id="display"></div>
            <div class="bttns">
                <div id="hour"></div>:
                <div id="min"></div>:
                <div id="sec"></div>
            </div>
        </div>
    </div>

    <script>
        let hour = document.querySelector("#hour");
        let minute = document.querySelector("#min");
        let second = document.querySelector("#sec");


        setInterval(() => {
            let getData = new Date();
            hour.textContent = (getData.getHours() < 10 ? "0" : "") + getData.getHours();
            minute.textContent = (getData.getMinutes() < 10 ? "0" : "") + getData.getMinutes();
            second.textContent = (getData.getSeconds() < 10 ? "0" : "") + getData.getSeconds();

        }, 1000)


    </script>
</body>

</html>
