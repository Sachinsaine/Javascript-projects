<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #222222;
      --border: #2e2e2e;
      --text: #f0f0f0;
      --muted: #6b6b6b;
      --green: #22c55e;
      --red: #ef4444;
      --radius: 12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 24px 32px 20px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      width: 36px;
      height: 36px;
      background: #1e1e1e;
      border: 1px solid var(--border);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      color: var(--muted);
    }

    .header h1 {
      font-family: 'Space Mono', monospace;
      font-size: 15px;
      letter-spacing: 0.12em;
      color: var(--text);
      text-transform: uppercase;
    }

    .main {
      display: grid;
      grid-template-columns: 380px 1fr;
      flex: 1;
      overflow: hidden;
      min-height: 0;
    }

    .left-panel {
      border-right: 1px solid var(--border);
      padding: 32px 28px;
      display: flex;
      flex-direction: column;
      gap: 32px;
      overflow-y: auto;
    }

    .balance-section h2 {
      font-size: 13px;
      color: var(--muted);
      font-weight: 500;
      letter-spacing: 0.04em;
      margin-bottom: 6px;
    }

    .balance-label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .total-balance {
      font-family: 'Space Mono', monospace;
      font-size: 36px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-bottom: 20px;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin-bottom: 20px;
    }

    .balance-row {
      display: flex;
      justify-content: space-between;
    }

    .balance-item label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .balance-item .amount {
      font-family: 'Space Mono', monospace;
      font-size: 15px;
      font-weight: 700;
    }

    .income .amount {
      color: var(--green);
    }

    .expense .amount {
      color: var(--red);
    }

    .form-section h2 {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 20px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 14px;
    }

    .form-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-field label {
      font-size: 12px;
      color: var(--muted);
      font-weight: 500;
    }

    .form-field input,
    .form-field select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
      appearance: none;
      -webkit-appearance: none;
    }

    .form-field input:focus,
    .form-field select:focus {
      border-color: #444;
    }

    .form-field input::placeholder {
      color: var(--muted);
    }

    .select-wrapper {
      position: relative;
    }

    .select-wrapper::after {
      content: '▾';
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
      font-size: 12px;
    }

    .btn-add {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 13px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }

    .btn-add:hover {
      background: #2a2a2a;
      border-color: #444;
    }

    .btn-add:active {
      background: #333;
    }

    .right-panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .right-panel h2 {
      font-size: 16px;
      font-weight: 600;
      padding: 28px 28px 20px;
      color: var(--text);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .transaction-list {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .transaction-list::-webkit-scrollbar {
      width: 4px;
    }

    .transaction-list::-webkit-scrollbar-track {
      background: transparent;
    }

    .transaction-list::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    .tx-item {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      transition: border-color 0.2s;
      animation: slideIn 0.25s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .tx-item:hover {
      border-color: #3a3a3a;
    }

    .tx-icon {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .tx-icon.income {
      background: var(--green);
    }

    .tx-icon.expense {
      background: var(--red);
    }

    .tx-icon svg {
      width: 16px;
      height: 16px;
      stroke: #fff;
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .tx-info {
      flex: 1;
      min-width: 0;
    }

    .tx-info .tx-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tx-info .tx-date {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }

    .tx-amount {
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
      margin-left: auto;
    }

    .tx-amount.income {
      color: var(--green);
    }

    .tx-amount.expense {
      color: var(--red);
    }

    .tx-remove {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 16px;
      padding: 2px 6px;
      border-radius: 4px;
      line-height: 1;
      transition: color 0.2s, background 0.2s;
    }

    .tx-remove:hover {
      color: var(--text);
      background: var(--border);
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 60px 20px;
      color: var(--muted);
      font-size: 14px;
    }

    .empty-state svg {
      opacity: 0.3;
    }

    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 32px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--muted);
      flex-shrink: 0;
    }

    .footer .logo-small {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .footer .logo-small .logo {
      width: 26px;
      height: 26px;
      font-size: 11px;
    }

    .social-links {
      display: flex;
      gap: 10px;
    }

    .social-links a {
      width: 34px;
      height: 34px;
      border: 1px solid var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      text-decoration: none;
      transition: border-color 0.2s, color 0.2s;
    }

    .social-links a:hover {
      border-color: #555;
      color: var(--text);
    }

    .social-links svg {
      width: 14px;
      height: 14px;
      fill: currentColor;
    }

    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #222;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 13px;
      color: var(--text);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s, transform 0.3s;
      z-index: 100;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 768px) {
      .main {
        grid-template-columns: 1fr;
      }

      .left-panel {
        border-right: none;
        border-bottom: 1px solid var(--border);
      }
    }
  </style>
</head>

<body>

  <header class="header">
    <div class="logo">ℓ</div>
    <h1>Expense Tracker</h1>
  </header>

  <div class="main">
    <aside class="left-panel">
      <div class="balance-section">
        <h2>Balance Summary</h2>
        <div class="balance-label">Total Balance</div>
        <div class="total-balance" id="totalBalance">$0.00</div>
        <div class="divider"></div>
        <div class="balance-row">
          <div class="balance-item income">
            <label>Total Income</label>
            <div class="amount" id="totalIncome">$0.00</div>
          </div>
          <div class="balance-item expense">
            <label>Total Expense</label>
            <div class="amount" id="totalExpense">$0.00</div>
          </div>
        </div>
      </div>

      <div class="form-section">
        <h2>Add New Transaction</h2>
        <div class="form-grid">
          <div class="form-field">
            <label>Type</label>
            <div class="select-wrapper">
              <select id="txType">
                <option value="income">Income</option>
                <option value="expense">Expense</option>
              </select>
            </div>
          </div>
          <div class="form-field">
            <label>Amount</label>
            <input type="number" id="txAmount" placeholder="$ 0.00" min="0" step="0.01" />
          </div>
          <div class="form-field">
            <label>Date</label>
            <input type="date" id="txDate" />
          </div>
          <div class="form-field">
            <label>Category</label>
            <input type="text" id="txCategory" placeholder="e.g. Salary, Groceries" />
          </div>
        </div>
        <button class="btn-add" onclick="addTransaction()">Add Transaction</button>
      </div>
    </aside>

    <section class="right-panel">
      <h2>Transaction History</h2>
      <div class="transaction-list" id="txList"></div>
    </section>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const transactions = [
      { id: 1, name: 'Salary', date: 'Oct 25, 2023', amount: 5000, type: 'income' },
      { id: 2, name: 'Groceries', date: 'Oct 24, 2023', amount: 124.50, type: 'expense' },
      { id: 3, name: 'Rent', date: 'Oct 22, 2023', amount: 2000, type: 'expense' },
      { id: 4, name: 'Freelance Project', date: 'Oct 20, 2023', amount: 5000, type: 'income' },
      { id: 5, name: 'Dinner Out', date: 'Oct 19, 2023', amount: 75, type: 'expense' },
      { id: 6, name: 'Utilities', date: 'Oct 15, 2023', amount: 2050, type: 'expense' },
      { id: 7, name: 'Bonus Payment', date: 'Oct 13, 2023', amount: 1500, type: 'income' },
    ];
    let nextId = 8;

    document.getElementById('txDate').valueAsDate = new Date();

    function fmt(n) {
      return '$' + Math.abs(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function fmtDate(dateStr) {
      const d = new Date(dateStr + 'T00:00:00');
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function upArrow() {
      return `<svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg>`;
    }
    function downArrow() {
      return `<svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>`;
    }

    function updateSummary() {
      const income = transactions.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
      const expense = transactions.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
      document.getElementById('totalBalance').textContent = fmt(income - expense);
      document.getElementById('totalIncome').textContent = fmt(income);
      document.getElementById('totalExpense').textContent = fmt(expense);
    }

    function renderList() {
      const list = document.getElementById('txList');
      if (!transactions.length) {
        list.innerHTML = `<div class="empty-state">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="2" y="5" width="20" height="14" rx="2"/>
          <path d="M2 10h20"/>
        </svg>
        <span>No transactions yet</span>
      </div>`;
        return;
      }
      list.innerHTML = transactions.map(t => `
      <div class="tx-item" id="tx-${t.id}">
        <div class="tx-icon ${t.type}">${t.type === 'income' ? upArrow() : downArrow()}</div>
        <div class="tx-info">
          <div class="tx-name">${t.name}</div>
          <div class="tx-date">${t.date}</div>
        </div>
        <div class="tx-amount ${t.type}">${t.type === 'income' ? '+' : '-'}${fmt(t.amount)}</div>
        <button class="tx-remove" onclick="removeTransaction(${t.id})">×</button>
      </div>
    `).join('');
    }

    function removeTransaction(id) {
      const idx = transactions.findIndex(t => t.id === id);
      if (idx > -1) { transactions.splice(idx, 1); renderList(); updateSummary(); }
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }

    function addTransaction() {
      const type = document.getElementById('txType').value;
      const amount = parseFloat(document.getElementById('txAmount').value);
      const date = document.getElementById('txDate').value;
      const category = document.getElementById('txCategory').value.trim();

      if (!amount || amount <= 0) { showToast('Please enter a valid amount'); return; }
      if (!date) { showToast('Please select a date'); return; }
      if (!category) { showToast('Please enter a category'); return; }

      transactions.unshift({ id: nextId++, name: category, date: fmtDate(date), amount, type });
      document.getElementById('txAmount').value = '';
      document.getElementById('txCategory').value = '';
      document.getElementById('txDate').valueAsDate = new Date();
      renderList(); updateSummary();
      showToast('Transaction added!');
    }

    renderList();
    updateSummary();
  </script>
</body>

</html>
