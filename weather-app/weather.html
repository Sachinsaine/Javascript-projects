<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
    <link rel="stylesheet" href="weather.css" />
</head>

<body>

    <div class="container">
        <h1>🌦️ Weather App</h1>

        <div class="search-box">
            <input type="text" id="cityInput" placeholder="Enter city name..." />
            <button id="searchBtn">Search</button>
        </div>

        <div class="weather-box" id="weatherBox">
            <h2 id="city"></h2>
            <p id="temp"></p>
            <p id="humidity"></p>
            <p id="wind"></p>
        </div>

    </div>

    <script>

        let city = document.querySelector("#city");
        let temprature = document.querySelector("#temp");
        let humidity = document.querySelector("#humidity")
        let wind = document.querySelector("#wind");
        let input = document.querySelector("#cityInput");
        let searchBttn = document.querySelector("#searchBtn");


        async function checkWeather(cityName) {
            let apiKey = "b3942fc757252dfaaffbd1c63889ca6a";
            let apiUrl = `https://api.openweathermap.org/data/2.5/weather?units=metric&q=${cityName}&appid=${apiKey}`;
            const res = await fetch(apiUrl)
            let data = await res.json();
            city.innerHTML = data.name;
            temprature.innerHTML = Math.round(data.main.temp) + "°C";
            humidity.innerHTML = data.main.humidity + "Humidity%";
            wind.innerHTML = data.wind.speed + "km/h"
        }

        searchBttn.addEventListener("click", () => {
            let cityName = input.value;
            input.value = ""

            if (!cityName) {
                alert("Please enter a city name")
            }

            checkWeather(cityName)
        })
        checkWeather("Germany")
    </script>
    <script src="weather.js"></script>
</body>

</html>
