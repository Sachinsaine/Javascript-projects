<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="calculator.css">
</head>

<body>

    <div class="calc">
        <div class="display">
            <input id="result" name="display" class="btn-num" placeholder="0">
        </div>

        <div class="grid">
            <input type="button" value="AC" class="btn-fn" onclick="display.value = '' ">
            <input type="button" value="DE" class="btn-fn"
                onclick="display.value = display.value.toString().slice(0, -1)">
            <input type="button" value="%" class="btn-fn" onclick="display.value += '%' ">
            <input type="button" value="/" class="btn-op" onclick="display.value += '/' ">

            <input type="button" value="7" class="btn-num" onclick="display.value += '7' ">
            <input type="button" value="8" class="btn-num" onclick="display.value += '8' ">
            <input type="button" value="9" class="btn-num" onclick="display.value += '9' ">
            <input type="button" value="*" class="btn-op" onclick="display.value += '*' ">

            <input type="button" value="4" class="btn-num" onclick="display.value += '4' ">
            <input type="button" value="5" class="btn-num" onclick="display.value += '5' ">
            <input type="button" value="6" class="btn-num" onclick="display.value += '6' ">
            <input type="button" value="-" class="btn-op" onclick="display.value += '-' ">

            <input type="button" value="1" class="btn-num" onclick="display.value += '1' ">
            <input type="button" value="2" class="btn-num" onclick="display.value += '2' ">
            <input type="button" value="3" class="btn-num" onclick="display.value += '3' ">
            <input type="button" value="+" class="btn-op" onclick="display.value += '+' ">

            <input type="button" value="0" class="btn-num btn-zero" onclick="display.value += '0' ">
            <input type="button" value="." class="btn-num btn-dot" onclick="display.value += '.' ">
            <input type="button" value="=" class="btn-eq" onclick="display.value = eval(display.value)">
        </div>
    </div>

    <script src="calculator.js"></script>
</body>

</html>
