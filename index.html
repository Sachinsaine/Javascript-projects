<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div>
        <input type="date" id="date" placeholder="">
        <button onclick="handleCalculate()">Calculate</button>
    </div>

    <script>
        let myDate = document.querySelector("#date");

        // Prevent selecting future dates
        myDate.max = new Date().toISOString().split("T")[0];

        function handleCalculate() {

            let birthDate = new Date(myDate.value);
            let currDate = new Date();

            let birthYear = birthDate.getFullYear();
            let birthMonth = birthDate.getMonth() + 1;
            let birthDay = birthDate.getDate();

            let currentYear = currDate.getFullYear();
            let currentMonth = currDate.getMonth() + 1;
            let currentDay = currDate.getDate();

            console.log("Birth Date:", birthDay, birthMonth, birthYear);
            console.log("Current Date:", currentDay, currentMonth, currentYear);

            let age = currentYear - birthYear;

            // Adjust age if birthday hasn't occurred yet this year
            if (
                currentMonth < birthMonth ||
                (currentMonth === birthMonth && currentDay < birthDay)
            ) {
                age--;
            }

            console.log("Age:", age);
        }
    </script>
</body>

</html>
