<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>Product details</h1>
    <div id="display"></div>
    <script>
        let item = JSON.parse(localStorage.getItem("selectedProducts")) || []
        let dispaly = document.querySelector("#display")

        let card = document.createElement("div");
        card.innerHTML = `
            <div class="cart-img-wrap">
        <img src="${item.image_link}" alt="${item.name}">
      </div>

      <div class="cart-info">
        <p class="cart-category">${item.product_type || "makeup"}</p>
        <h3>${item.name}</h3>
        <p class="cart-price">$${item.price || "20.00"}</p>
      </div>

      <div class="cart-actions">
        <button class="add">Add to cart</button>
        <button class="buyBtn">Buy Now</button>
      </div>
        `

        dispaly.appendChild(card)
    </script>
</body>

</html>
