<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="digital.css">
</head>

<body>

    <div class="clock-wrapper">
        <p class="label">System Time</p>

        <div class="clock">
            <div class="unit">
                <div class="digits">
                    <div class="d" id="hr">00</div>
                </div>
                <span class="unit-label">HH</span>
            </div>

            <div class="sep"><span></span><span></span></div>

            <div class="unit">
                <div class="digits">
                    <div class="d" id="min">00</div>

                </div>
                <span class="unit-label">MM</span>
            </div>

            <div class="sep"><span></span><span></span></div>

            <div class="unit">
                <div class="digits">
                    <div class="d" id="sec">00</div>

                </div>
                <span class="unit-label">SS</span>
            </div>
        </div>

        <div class="bar">
            <span>24h</span>
            <span>digital clock</span>
        </div>
    </div>

    <script src="digital.js"></script>
</body>

</html>
