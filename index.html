<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <style>
        #products {
            display: grid;
            grid-template-rows: auto;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="inputCont">
            <input type="text" id="searchInput" placeholder="Search items...">
            <button id="searchBtn">Search</button>
            <span id="addedItems">Cart <b id="totalItems">0</b> </span>
        </div>
        <div id="products">

        </div>
    </div>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script>
        let display = document.querySelector("#products");
        let numberOfItemsAdded = document.querySelector("#totalItems")
        let yourCart = []
        let allProducts = []
        let inputValue = document.querySelector("#searchInput");
        let searchBttn = document.querySelector("#searchBtn")


        fetch("https://makeup-api.herokuapp.com/api/v1/products.json?brand=maybelline")
            .then(res => res.json())
            .then(data => {
                allProducts = data;
                renderProducts(allProducts)
            })
            .catch(err => console.log(err)
            )

        function renderProducts(products) {
            display.innerHTML = ""; // Clear previous products

            products.forEach(item => {
                let card = document.createElement("div");

                card.innerHTML = `
            <img src="${item.image_link}" alt="${item.name}">
            <h2>${item.name}</h2>
            <h5>${item.price}</h5>
            <button class="addBtn">Add to cart</button>
        `;

                let cartBtn = card.querySelector(".addBtn");

                cartBtn.addEventListener("click", () => {
                    let existentItem = yourCart.some(
                        cartId => cartId.id === item.id
                    );

                    if (existentItem) {
                        return Toastify({
                            text: "Already added",
                            duration: 3000,
                            gravity: "top",
                            position: "right",
                            style: {
                                background:
                                    "linear-gradient(to right, #00b09b, #96c93d)"
                            }
                        }).showToast();
                    }

                    yourCart.push(item);
                    numberOfItemsAdded.textContent = yourCart.length;
                });

                display.appendChild(card);
            });
        }

        inputValue.addEventListener("input", () => {
            let value = inputValue.value.toLowerCase();

            let filteredProducts = allProducts.filter(item =>
                item.name.toLowerCase().includes(value)
            );

            renderProducts(filteredProducts);
        });

    </script>
</body>

</html>
